name: Check Links

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "00 18 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      issues: write # required for peter-evans/create-issue-from-file
    steps:
      - uses: actions/checkout@v7

      - name: Link Checker (CI strict)
        if: github.event_name != 'schedule'
        id: lychee_strict
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --verbose --no-progress --root-dir ${{ github.workspace }} 'web/**/*.jsx' './**/*.md' './quality-tools/**/*.json'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Link Checker (scheduled report)
        if: github.event_name == 'schedule'
        id: lychee_schedule
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --verbose --no-progress --root-dir ${{ github.workspace }} 'web/**/*.jsx' './**/*.md' './quality-tools/**/*.json'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for actual broken links (ignoring timeouts)
        id: check_errors
        if: github.event_name == 'schedule' && steps.lychee_schedule.outputs.exit_code != 0
        run: |
          # Extract the error count from the lychee summary table (e.g. "| 🚫 Errors      | 5     |")
          errors=$(grep -oP 'Errors\s+\|\s+\K\d+' ./lychee/out.md || echo "0")
          if [ "$errors" -gt 0 ]; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue From File
        if: github.event_name == 'schedule' && steps.check_errors.outputs.has_errors == 'true'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
