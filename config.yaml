# ────────────────────────────────────────────────────────────────────────────
# TechRadar Platform Configuration
# ────────────────────────────────────────────────────────────────────────────

platform:
  name: "EVERSE TechRadar"
  tagline: "A catalog of tools and services for research software quality, radar 
    covers reproducibility, maintainability, FAIRness, security, testing, and more. 
    Find the right tools to improve your research software quality"
  description: >
    A catalog of tools and services for research software quality.
    Covers reproducibility, maintainability, FAIRness, security, testing, and more.
  baseUrl: "/techradar/"
  repository: "https://github.com/EVERSE-ResearchSoftware/TechRadar/"
  logoPath: "/techradar/logo.svg"
  contributingUrl: "https://github.com/EVERSE-ResearchSoftware/TechRadar/blob/main/CONTRIBUTING.md"
  privacyUrl: "https://everse.software/privacy/"

# ── Curator Team ─────────────────────────────────────────────────────────────
curators:
  - name: "Your Name"
    affiliation: "Your Institution"
    github: "https://github.com/yourusername"
  - name: "Curator Two"
    affiliation: "Their Institution"
    github: "https://github.com/curatortwousername"
  - name: "Curator Three"
    affiliation: "Their Institution"
    github: ""

# ── Radar Tiers ──────────────────────────────────────────────────────────────
# Add, remove, or rename tiers here. UI adapts automatically.
tiers:
  - id: Analysis Code
    label: "Analysis Code"
    description: >
      Proven tools we strongly recommend. Widely used and trusted by the
      research software community.
    color: "#4af0a0"
    ring: 1

  - id: Prototype Tool
    label: "Prototype Tool"
    description: >
      Tools worth pursuing. We have used them in projects and recommend
      evaluating them for your context.
    color: "#6a8cff"
    ring: 2

  - id: Research Software Infrastructure
    label: "Research Software Infrastructure"
    description: >
      Tools to watch closely but not necessarily use yet. They show promise
      but need more community validation.
    color: "#ffd166"
    ring: 3

# ── Quality Dimensions ───────────────────────────────────────────────────────
# Configurable — add, remove, or rename dimensions without any code changes.
dimensions:
  - id: compatibility
    label: "Compatibility"
    description: "Degree to which a product, system or component can exchange information with other products, systems or components, and/or perform its required functions while sharing the same common environment and resources."
    color: "#a0b8ff"

  - id: maintainability
    label: "Maintainability"
    description: "This characteristic represents the degree of effectiveness and efficiency with which a product or system can be modified to improve it, correct it or adapt it to changes in environment, and in requirements."
    color: "#6a8cff"

  - id: fairness
    label: "FAIRness"
    description: "FAIRness refers to the degree to which research software adheres to the FAIR principles: Findable, Accessible, Interoperable, and Reusable. These principles, adapted for research software, aim to enhance the discoverability, accessibility, interoperability, and reusability of software, thereby maximizing its value and impact in scientific research."
    color: "#ffd166"
  
  - id: functional_suitability
    label: "Functional Suitability"
    description: "This characteristic represents the degree to which a product or system provides functions that meet stated and implied needs when used under specified conditions."
    color: "#e8c87a"

  - id: interaction_capability
    label: "Interaction Capability"
    description: "Degree to which a product or system can be interacted with by specified users to exchange information via the user interface to complete specific tasks in a variety of contexts of use."
    color: "#ff7b4f"

  - id: open_source_software
    label: "Open Source Software"
    description: "Open source software is software with source code that anyone can inspect, modify, and enhance. Research software can be published with or without open access to the source code."
    color: "#b8f5e4"

  - id: performance_efficiency
    label: "Performance Efficiency"
    description: "This characteristic represents the degree to which a product performs its functions within specified time and throughput parameters and is efficient in the use of resources (such as CPU, memory, storage, network devices, energy, materials...) under specified conditions."
    color: "#ffe499"

  - id: reliability
    label: "Reliability"
    description: "Degree to which a system, product or component performs specified functions under specified conditions for a specified period of time."
    color: "#ffb49a"

  - id: security
    label: "Security"
    description: "Degree to which a product or system defends against attack patterns by malicious actors and protects information and data so that persons or other products or systems have the degree of data access appropriate to their types and levels of authorization."
    color: "#7df5c5"

  - id: sustainability
    label: "Sustainability"
    description: "The capacity of the software to endure. In other words, sustainability means that the software will continue to be available in the future, on new platforms, meeting new needs."
    color: "#8fa8ff"

 

# ── Software Tiers (classification) ────────────────────────
softwareTypes:
  - "Analysis Code"
  - "Prototype Tool"
  - "Research Software Infrastructure"

# Used for validation and filter chips
licenses:
  - MIT
  - Apache-2.0
  - CC0-1.0
  - CC-BY-4.0
  - Other

ui:
  defaultSort: "name"          
  cardsPerPage: 24
  defaultView: "grid"         
  showRadar: true
  theme: "dark"

theme:
  colorBg:       "#f6f4f9"  
  colorSurface:  "#ffffff" 
  colorSurface2: "#ede9f4" 
  colorBorder:   "#d5cce6" 

  colorText:  "#1e1028"  
  colorMuted: "#5c4d72"  
  colorDim:   "#a494bc"   


  colorGreen:  "#80529a"   
  colorBlue:   "#3ea3dc"   
  colorYellow: "#c47d00"  
  colorOrange: "#c0392b"  

  fontDisplay: "Syne, sans-serif"
  fontBody:    "DM Sans, sans-serif"
  fontMono:    "DM Mono, monospace"
  fontSize:    "14px"

  radiusCard: "12px"
  radiusChip: "8px"