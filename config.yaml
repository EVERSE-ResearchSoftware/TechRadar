# ────────────────────────────────────────────────────────────────────────────
# TechRadar Platform Configuration
# All platform behaviour is driven from this file — no hard-coded values.
# To deploy a custom instance: fork the repo, edit this file, done.
# ────────────────────────────────────────────────────────────────────────────

platform:
  name: "EVERSE TechRadar"
  tagline: "A catalog of tools and services for research software quality, radar 
    covers reproducibility, maintainability, FAIRness, security, testing, and more. 
    Find the right tools to improve your research software quality"
  description: >
    A discovery-first catalog of tools and services for research software quality.
    Covers reproducibility, maintainability, FAIRness, security, testing, and more.
  baseUrl: "/techradar"
  repository: "https://github.com/EVERSE-ResearchSoftware/TechRadar/"
  contact: "techradar@your-org.example"
  logoPath: "/techradar/logo.svg"   # path to logo in public/; set to "" to show text name instead
  contributingUrl: "https://github.com/EVERSE-ResearchSoftware/TechRadar/blob/main/CONTRIBUTING.md"
  privacyUrl: "https://everse.software/privacy/"

# ── Curator Team ─────────────────────────────────────────────────────────────
curators:
  - name: "Your Name"
    affiliation: "Your Institution"
    github: "https://github.com/yourusername"
  - name: "Curator Two"
    affiliation: "Their Institution"
    github: "https://github.com/curatortwousername"
  - name: "Curator Three"
    affiliation: "Their Institution"
    github: ""

# ── Radar Tiers ──────────────────────────────────────────────────────────────
# Add, remove, or rename tiers here. UI adapts automatically.
tiers:
  - id: Analysis Code
    label: "Analysis Code"
    description: >
      Proven tools we strongly recommend. Widely used and trusted by the
      research software community.
    color: "#4af0a0"
    ring: 1

  - id: Prototype Tool
    label: "Prototype Tool"
    description: >
      Tools worth pursuing. We have used them in projects and recommend
      evaluating them for your context.
    color: "#6a8cff"
    ring: 2

  - id: Research Software Infrastructure
    label: "Research Software Infrastructure"
    description: >
      Tools to watch closely but not necessarily use yet. They show promise
      but need more community validation.
    color: "#ffd166"
    ring: 3

# ── Quality Dimensions ───────────────────────────────────────────────────────
# Configurable — add, remove, or rename dimensions without any code changes.
# Tool YAML files reference dimensions by their `label` value.
dimensions:
  - id: reproducibility
    label: "Reproducibility"
    description: "Ability to reproduce results from the same software and data"
    color: "#4af0a0"

  - id: maintainability
    label: "Maintainability"
    description: "Ease of modifying, understanding, and evolving the software"
    color: "#6a8cff"

  - id: fairness
    label: "FAIRness"
    description: "Findability, Accessibility, Interoperability, Reusability"
    color: "#ffd166"

  - id: security
    label: "Security"
    description: "Protection against vulnerabilities and unauthorised access"
    color: "#ff7b4f"

  - id: documentation
    label: "Documentation"
    description: "Quality and completeness of documentation for users and developers"
    color: "#b8f5e4"

  - id: testing
    label: "Testing"
    description: "Test coverage, automation, and validation of software behaviour"
    color: "#a0b8ff"

  - id: portability
    label: "Portability"
    description: "Ability to run on different platforms and environments"
    color: "#ffe499"

  - id: interoperability
    label: "Interoperability"
    description: "Ability to exchange data and work with other tools"
    color: "#ffb49a"

  - id: usability
    label: "Usability"
    description: "Ease of use and learning curve for the intended audience"
    color: "#7df5c5"

  - id: performance
    label: "Performance"
    description: "Computational efficiency and resource utilisation"
    color: "#8fa8ff"

  - id: accessibility
    label: "Accessibility"
    description: "Inclusive design for users with different abilities"
    color: "#e8c87a"

# ── Software Tiers (classification, not quality tiers) ────────────────────────
softwareTypes:
  - "Analysis Code"
  - "Prototype Tool"
  - "Research Software Infrastructure"

# ── Controlled Vocabularies ───────────────────────────────────────────────────
# Used for validation and filter chips
licenses:
  - MIT
  - Apache-2.0
  - CC0-1.0
  - CC-BY-4.0
  - Other

# ── UI Preferences ────────────────────────────────────────────────────────────
ui:
  defaultSort: "name"          # name | tier | newest
  cardsPerPage: 24
  defaultView: "grid"          # grid | list
  showRadar: true
  theme: "dark"

# ── Contribution ──────────────────────────────────────────────────────────────
contribution:
  requiredFields:
    - name
    - description
    - website
    - tier
    - softwareType
    - dimensions
    - license
  optionalFields:
    - repository
    - languages
    - useCases
    - indicators
    - tags
    - alternativeTo
    - icon
  guideUrl: "CONTRIBUTING.md"
  schemaPath: "scripts/schema/tool.schema.json"

# ── Theme ─────────────────────────────────────────────────────────────────────
# All visual tokens for the UI. Change any value here and run `npm run dev`
# or `npm run build` — the browser will pick up the new theme automatically.
# No code changes needed.
#
# Colors: any valid CSS color (hex, rgb, hsl)
# Fonts:  any Google Font or system font stack
# Sizes:  use px units
#
# Built-in font stacks (no extra setup needed):
#   sans-serif:  "Syne, sans-serif" | "DM Sans, sans-serif" | "Inter, sans-serif" | "system-ui, sans-serif"
#   serif:       "Georgia, serif"   | "Merriweather, serif"
#   monospace:   "DM Mono, monospace" | "Fira Code, monospace" | "Courier New, monospace"
#
# To use a custom Google Font: add it to the <link> in index.html, then reference it here.

theme:
  # ── EVERSE brand palette ───────────────────────────────────────────────────
  # Exact hex values extracted from the EVERSE logo SVG:
  #   Purple  #80529a  — logo mark + RSE lettering
  #   Blue    #3ea3dc  — arc element + EVE lettering
  #   Black   #040305  — body text in logo

  # ── Background layers ──────────────────────────────────────────────────────
  colorBg:       "#f6f4f9"   # very light purple-tinted page background
  colorSurface:  "#ffffff"   # white cards and nav
  colorSurface2: "#ede9f4"   # light purple-tinted inputs, sidebar
  colorBorder:   "#d5cce6"   # soft purple-grey dividers

  # ── Text ───────────────────────────────────────────────────────────────────
  colorText:  "#1e1028"   # deep purple-black — strong readable text
  colorMuted: "#5c4d72"   # mid-tone purple — descriptions, labels
  colorDim:   "#a494bc"   # light purple — placeholders, disabled

  # ── Accent colors ──────────────────────────────────────────────────────────
  # colorGreen  → primary accent: buttons, active states, "Adopt" tier
  # colorBlue   → secondary accent: links, "Trial" tier
  # colorYellow → warning tone: "Assess" tier
  # colorOrange → danger / "Hold" tier
  colorGreen:  "#80529a"   # EVERSE purple — primary brand accent
  colorBlue:   "#3ea3dc"   # EVERSE blue — secondary brand accent
  colorYellow: "#c47d00"   # amber — assess / warning
  colorOrange: "#c0392b"   # red — hold / danger

  # ── Typography ─────────────────────────────────────────────────────────────
  fontDisplay: "Syne, sans-serif"
  fontBody:    "DM Sans, sans-serif"
  fontMono:    "DM Mono, monospace"
  fontSize:    "14px"

  # ── Shape ──────────────────────────────────────────────────────────────────
  radiusCard: "12px"
  radiusChip: "8px"
