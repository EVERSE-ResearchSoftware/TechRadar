# ────────────────────────────────────────────────────────────────────────────
# TechRadar Platform Configuration
# All platform behaviour is driven from this file — no hard-coded values.
# To deploy a custom instance: fork the repo, edit this file, done.
# ────────────────────────────────────────────────────────────────────────────

platform:
  name: "EVERSE TechRadar"
  tagline: "A catalog of tools and services for research software quality, radar 
    covers reproducibility, maintainability, FAIRness, security, testing, and more. 
    Find the right tools to improve your research software quality"
  description: >
    A catalog of tools and services for research software quality.
    Covers reproducibility, maintainability, FAIRness, security, testing, and more.
  baseUrl: "/techradar-branch-refactor/"
  repository: "https://github.com/EVERSE-ResearchSoftware/TechRadar/"
  logoPath: "/techradar/logo.svg"
  contributingUrl: "https://github.com/EVERSE-ResearchSoftware/TechRadar/blob/main/CONTRIBUTING.md"
  privacyUrl: "https://everse.software/privacy/"

# ── Curator Team ─────────────────────────────────────────────────────────────
curators:
  - name: "Your Name"
    affiliation: "Your Institution"
    github: "https://github.com/yourusername"
  - name: "Curator Two"
    affiliation: "Their Institution"
    github: "https://github.com/curatortwousername"
  - name: "Curator Three"
    affiliation: "Their Institution"
    github: ""

# ── Radar Tiers ──────────────────────────────────────────────────────────────
# Add, remove, or rename tiers here. UI adapts automatically.
tiers:
  - id: Analysis Code
    label: "Analysis Code"
    description: >
      Proven tools we strongly recommend. Widely used and trusted by the
      research software community.
    color: "#4af0a0"
    ring: 1

  - id: Prototype Tool
    label: "Prototype Tool"
    description: >
      Tools worth pursuing. We have used them in projects and recommend
      evaluating them for your context.
    color: "#6a8cff"
    ring: 2

  - id: Research Software Infrastructure
    label: "Research Software Infrastructure"
    description: >
      Tools to watch closely but not necessarily use yet. They show promise
      but need more community validation.
    color: "#ffd166"
    ring: 3

# ── Quality Dimensions ───────────────────────────────────────────────────────
# Configurable — add, remove, or rename dimensions without any code changes.
dimensions:
  - id: reproducibility
    label: "Reproducibility"
    description: "Ability to reproduce results from the same software and data"
    color: "#4af0a0"

  - id: maintainability
    label: "Maintainability"
    description: "Ease of modifying, understanding, and evolving the software"
    color: "#6a8cff"

  - id: fairness
    label: "FAIRness"
    description: "Findability, Accessibility, Interoperability, Reusability"
    color: "#ffd166"

  - id: security
    label: "Security"
    description: "Protection against vulnerabilities and unauthorised access"
    color: "#ff7b4f"

  - id: documentation
    label: "Documentation"
    description: "Quality and completeness of documentation for users and developers"
    color: "#b8f5e4"

  - id: testing
    label: "Testing"
    description: "Test coverage, automation, and validation of software behaviour"
    color: "#a0b8ff"

  - id: portability
    label: "Portability"
    description: "Ability to run on different platforms and environments"
    color: "#ffe499"

  - id: interoperability
    label: "Interoperability"
    description: "Ability to exchange data and work with other tools"
    color: "#ffb49a"

  - id: usability
    label: "Usability"
    description: "Ease of use and learning curve for the intended audience"
    color: "#7df5c5"

  - id: performance
    label: "Performance"
    description: "Computational efficiency and resource utilisation"
    color: "#8fa8ff"

  - id: accessibility
    label: "Accessibility"
    description: "Inclusive design for users with different abilities"
    color: "#e8c87a"

# ── Software Tiers (classification) ────────────────────────
softwareTypes:
  - "Analysis Code"
  - "Prototype Tool"
  - "Research Software Infrastructure"

# Used for validation and filter chips
licenses:
  - MIT
  - Apache-2.0
  - CC0-1.0
  - CC-BY-4.0
  - Other

ui:
  defaultSort: "name"          
  cardsPerPage: 24
  defaultView: "grid"         
  showRadar: true
  theme: "dark"

theme:
  colorBg:       "#f6f4f9"  
  colorSurface:  "#ffffff" 
  colorSurface2: "#ede9f4" 
  colorBorder:   "#d5cce6" 

  colorText:  "#1e1028"  
  colorMuted: "#5c4d72"  
  colorDim:   "#a494bc"   


  colorGreen:  "#80529a"   
  colorBlue:   "#3ea3dc"   
  colorYellow: "#c47d00"  
  colorOrange: "#c0392b"  

  fontDisplay: "Syne, sans-serif"
  fontBody:    "DM Sans, sans-serif"
  fontMono:    "DM Mono, monospace"
  fontSize:    "14px"

  radiusCard: "12px"
  radiusChip: "8px"